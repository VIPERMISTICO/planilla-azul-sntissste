<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Campaña Electoral AR - SNTISSSTE</title>
    
    <!-- CDN Combinado de Alta Estabilidad (A-Frame 1.2.0 + AR.js 3.3.2) -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>
    
    <style>
        /* Asegura que el contenedor de la cámara no interfiera con el HTML */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f4f8; /* Fondo de respaldo institucional */
        }
        
        /* Contenedor flotante del cartel informativo (Pop-up) */
        #popup-propuesta {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 420px;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
            z-index: 99999;
            text-align: center;
            border: 3px solid #0056b3;
        }
        #popup-propuesta img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 10px;
        }
        #btn-cerrar {
            margin-top: 15px;
            padding: 10px 25px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Estilos del aviso superior de interacción */
        #instrucciones {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 86, 179, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            z-index: 999;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Instrucción para guiar al votante corporativo -->
    <div id="instrucciones">¡Toca el logotipo flotante para ver la propuesta!</div>

    <!-- Indicador de versión de control interno -->
    <div style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; font-family: sans-serif; font-size: 12px; z-index: 99999;">v1.0.3</div>

    <!-- Modal interactiva con tu cartel de campaña -->
    <div id="popup-propuesta">
        <img id="imagen-propuesta" src="https://postimg.cc" alt="Propuesta SNTISSSTE">
        <br>
        <button id="btn-cerrar" onclick="cerrarPropuesta()">Cerrar</button>
    </div>

    <!-- Inicialización forzada del motor AR con parámetros de compatibilidad móvil -->
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        
        <a-assets>
            <!-- Servidor de imágenes con permisos globales CORS habilitados -->
            <img id="logo-seccion" src="https://ibb.co" crossorigin="anonymous">
        </a-assets>

        

        <!-- Elemento 3D interactivo con rotación matemática lineal continua -->
        <a-plane id="avatar-campana" 
                 src="#logo-seccion" 
                 width="0.9" 
                 height="0.9" 
                 position="0 1.3 -2" 
                 material="transparent: true; opacity: 1; side: double; shader: flat"
                 animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
                 class="clickable">
        </a-plane>

        <!-- Configuración de la cámara nativa del celular -->
        <a-camera raycaster="objects: .clickable">
            <a-cursor color="#0056b3" scale="0.3 0.3 0.3" opacity="0.5"></a-cursor>
        </a-camera>

    </a-scene>

    <script>
        // Disparador del pop-up al presionar el objeto 3D
        document.getElementById('avatar-campana').addEventListener('click', function () {
            document.getElementById('popup-propuesta').style.display = 'block';
        });

        // Cierre del cartel electoral
        function cerrarPropuesta() {
            document.getElementById('popup-propuesta').style.display = 'none';
        }
    </script>
</body>
</html>
