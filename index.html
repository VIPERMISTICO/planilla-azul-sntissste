<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Campaña Electoral AR - SNTISSSTE</title>
    
    <!-- Librerías estables de Realidad Aumentada -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        
        /* Contenedor flotante del cartel informativo (Pop-up) */
        #popup-propuesta {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 420px;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
            z-index: 99999;
            text-align: center;
            border: 3px solid #0056b3;
        }
        #popup-propuesta img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 10px;
        }
        #btn-cerrar {
            margin-top: 15px;
            padding: 10px 25px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Estilos del aviso superior de interacción */
        #instrucciones {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 86, 179, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            z-index: 999;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 350px;
        }
    </style>
</head>
<body>

    <!-- Instrucción para guiar al votante corporativo -->
    <div id="instrucciones">¡Toca el objeto azul flotante para ver la propuesta!</div>

    <!-- Indicador de versión de control interno -->
    <div style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; font-family: sans-serif; font-size: 12px; z-index: 99999;">v1.0.4</div>

    <!-- Ventana emergente con tu cartel de campaña -->
    <div id="popup-propuesta">
        <img id="imagen-propuesta" src="https://postimg.cc" alt="Propuesta SNTISSSTE">
        <br>
        <button id="btn-cerrar" onclick="cerrarPropuesta()">Cerrar</button>
    </div>

    <!-- Inicialización del motor AR sin marcadores -->
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        
        

        <!-- GRUPO DEL ICONO FLOTANTE AUTÓNOMO (Combina un anillo y un núcleo geométrico) -->
        
            
            <!-- Anillo tecnológico exterior azul -->
            <a-torus radius="0.4" radius-tubular="0.04" material="color: #0056b3; metalness: 0.8; roughness: 0.2"></a-torus>
            
            <!-- Núcleo central brillante -->
            <a-sphere radius="0.18" material="color: #00a8ff; emissive: #0056b3; metalness: 0.5"></a-sphere>
            
        

        <!-- Lector de cámara del dispositivo móvil -->
        <a-camera raycaster="objects: .clickable">
            <a-cursor color="#0056b3" scale="0.3 0.3 0.3" opacity="0.5"></a-cursor>
        </a-camera>

    </a-scene>

    <script>
        // Disparador del pop-up al presionar el objeto 3D autónomo
        document.getElementById('avatar-campana').addEventListener('click', function () {
            document.getElementById('popup-propuesta').style.display = 'block';
        });

        // Cierre del cartel electoral
        function cerrarPropuesta() {
            document.getElementById('popup-propuesta').style.display = 'none';
        }
    </script>
</body>
</html>
