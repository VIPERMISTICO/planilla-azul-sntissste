<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Campaña Electoral - SNTISSSTE Sección IV</title>
    <style>
        /* Fondo con animación de radar tecnológico */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #00254d 0%, #001026 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Ondas del radar de campaña */
        .radar-pulse {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid rgba(0, 168, 255, 0.4);
            border-radius: 50%;
            animation: pulse 3s infinite linear;
            pointer-events: none;
        }
        .pulse2 { animation-delay: 1s; }
        .pulse3 { animation-delay: 2s; }

        @keyframes pulse {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Instrucciones superiores */
        #instrucciones {
            position: fixed;
            top: 30px;
            background: rgba(0, 86, 179, 0.95);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 320px;
            z-index: 10;
            letter-spacing: 0.5px;
        }

        /* Objeto flotante interactivo (Reemplazo del Icono 3D) */
        #icono-interactivo {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.5), inset 0 4px 8px rgba(255,255,255,0.3);
            border: 4px solid #ffffff;
            z-index: 5;
            animation: float 4s ease-in-out infinite;
            padding: 10px;
            box-sizing: border-box;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Ventana emergente (Pop-up de la propuesta) */
        #popup-propuesta {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 420px;
            background: #ffffff;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            z-index: 99999;
            text-align: center;
            border: 4px solid #0056b3;
            animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleUp {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #popup-propuesta img {
            width: 100%;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #btn-cerrar {
            margin-top: 18px;
            padding: 12px 35px;
            background: linear-gradient(135deg, #0056b3, #003d82);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,86,179,0.4);
            transition: 0.2s;
        }

        #btn-cerrar:active {
            transform: scale(0.95);
        }

        /* Control de versión */
        .version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            z-index: 100000;
        }
    </style>
</head>
<body>

    <!-- Mensaje guía superior -->
    <div id="instrucciones">PROPUESTAS SECCIÓN IV</div>

    <!-- Ondas de radar de fondo -->
    <div class="radar-pulse"></div>
    <div class="radar-pulse pulse2"></div>
    <div class="radar-pulse pulse3"></div>

    <!-- Botón flotante interactivo central -->
    <div id="icono-interactivo" onclick="abrirPropuesta()">
        Toca para<br>Interactuar
    </div>

    <!-- Ventana emergente con tu lona digital real -->
    <div id="popup-propuesta">
        <img id="imagen-propuesta" src="https://postimg.cc" alt="Propuesta SNTISSSTE">
        <br>
        <button id="btn-cerrar" onclick="cerrarPropuesta()">Cerrar</button>
    </div>

    <!-- Identificador de versión interna -->
    <div class="version">v1.0.5</div>

    <script>
        function abrirPropuesta() {
            document.getElementById('popup-propuesta').style.display = 'block';
        }

        function cerrarPropuesta() {
            document.getElementById('popup-propuesta').style.display = 'none';
        }
    </script>
</body>
</html>
