<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Campaña Electoral - SNTISSSTE Sección IV</title>
    <style>
        /* Fondo con animación de radar tecnológico */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #00254d 0%, #001026 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Ondas del radar de campaña */
        .radar-pulse {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 2px solid rgba(0, 168, 255, 0.3);
            border-radius: 50%;
            animation: pulse 4s infinite linear;
            pointer-events: none;
            z-index: 1;
        }
        .pulse2 { animation-delay: 1.3s; }
        .pulse3 { animation-delay: 2.6s; }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Encabezado con Logotipo local flotante animado */
        #cabecera-logo {
            position: fixed;
            top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            animation: floatLogo 3.5s ease-in-out infinite;
        }

        #cabecera-logo img {
            width: 75px;
            height: auto;
            filter: drop-shadow(0px 4px 12px rgba(0, 168, 255, 0.5));
        }

        #cabecera-logo span {
            color: white;
            font-size: 13px;
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 2px;
            background: rgba(0, 86, 179, 0.8);
            padding: 4px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* Contenedor horizontal para organizar las 3 esferas */
        .contenedor-esferas {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            z-index: 5;
            width: 90%;
            max-width: 500px;
        }

        /* Estilo base para los botones flotantes interactivos */
        .esfera-interactiva {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            border: 3px solid #ffffff;
            box-sizing: border-box;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        .esfera-interactiva:active {
            transform: scale(0.9);
        }

        /* ACTUALIZADO: Tres tonalidades exclusivas de azul con efecto metálico */
        #esfera1 {
            background: linear-gradient(135deg, #0056b3, #002b66);
            box-shadow: 0 8px 25px rgba(0, 86, 179, 0.6), inset 0 3px 6px rgba(255,255,255,0.3);
            animation: floatEsfera 4s ease-in-out infinite;
        }

        #esfera2 {
            background: linear-gradient(135deg, #007bff, #0056b3);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.6), inset 0 3px 6px rgba(255,255,255,0.3);
            animation: floatEsfera 4.5s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        #esfera3 {
            background: linear-gradient(135deg, #00a8ff, #007bb5);
            box-shadow: 0 8px 25px rgba(0, 168, 255, 0.6), inset 0 3px 6px rgba(255,255,255,0.3);
            animation: floatEsfera 5s ease-in-out infinite;
            animation-delay: 1s;
        }

        @keyframes floatEsfera {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Ventana emergente general (Pop-up) */
        #popup-propuesta {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 420px;
            background: #ffffff;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            z-index: 99999;
            text-align: center;
            border: 4px solid #0056b3;
            animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleUp {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #popup-propuesta img {
            width: 100%;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: block;
        }

        #btn-cerrar {
            margin-top: 18px;
            padding: 12px 35px;
            background: linear-gradient(135deg, #0056b3, #003d82);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,86,179,0.4);
        }

        /* Control de versión */
        .version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            z-index: 100000;
        }
    </style>
</head>
<body>

    <!-- Cabecera Institucional Flotante Localizada (.jpeg) -->
    <div id="cabecera-logo">
        <img src="logo.jpeg" alt="Logo SNTISSSTE">
        <span>Sección IV</span>
    </div>

    <!-- Ondas de radar de fondo -->
    <div class="radar-pulse"></div>
    <div class="radar-pulse pulse2"></div>
    <div class="radar-pulse pulse3"></div>

    <!-- Panel de esferas interactivas agrupadas -->
    <div class="contenedor-esferas">
        <div id="esfera1" class="esfera-interactiva" onclick="abrirPropuesta('propuesta.jpeg')">Proyecto<br>En Marcha</div>
        <div id="esfera2" class="esfera-interactiva" onclick="abrirPropuesta('propuesta2.jpeg')">Nuestro<br>Candidato</div>
        <div id="esfera3" class="esfera-interactiva" onclick="abrirPropuesta('propuesta3.jpeg')">Recuerda<br>En las Elecciones</div>
    </div>

    <!-- Ventana emergente inteligente -->
    <div id="popup-propuesta">
        <img id="imagen-dinamica" src="" alt="Propuesta de Campaña">
        <br>
        <button id="btn-cerrar" onclick="cerrarPropuesta()">Cerrar</button>
    </div>

    <!-- Identificador de versión definitiva de diseño -->
    <div class="version">v1.1.3</div>

    <script>
        function abrirPropuesta(nombreImagen) {
            const popup = document.getElementById('popup-propuesta');
            const img = document.getElementById('imagen-dinamica');
            img.src = nombreImagen;
            popup.style.display = 'block';
        }

        function cerrarPropuesta() {
            document.getElementById('popup-propuesta').style.display = 'none';
        }
    </script>
</body>
</html>
