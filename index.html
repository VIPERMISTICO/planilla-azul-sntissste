<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Campaña Electoral AR - SNTISSSTE Sección IV</title>
    <!-- Librerías de desarrollo WebAR (A-Frame y AR.js) -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>
    
    <style>
        /* Panel emergente que despliega el cartel informativo */
        #popup-propuesta {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 420px;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
            z-index: 9999;
            text-align: center;
            border: 3px solid #0056b3;
        }
        #popup-propuesta img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 10px;
        }
        #btn-cerrar {
            margin-top: 15px;
            padding: 10px 25px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        #btn-cerrar:active {
            background: #003d82;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Despliegue de tu propuesta al interactuar -->
    <div id="popup-propuesta">
        <img id="imagen-propuesta" src="https://postimg.cc" alt="Propuesta SNTISSSTE">
        <br>
        <button id="btn-cerrar" onclick="cerrarPropuesta()">Cerrar</button>
    </div>

    <!-- Escena de Realidad Aumentada -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        
        <!-- Precarga de recursos gráficos (Logotipo de la Sección IV) -->
        <a-assets>
            <img id="logo-seccion" src="https://postimg.cc" crossorigin="anonymous">
        </a-assets>

        <!-- Configuración lumínica del entorno -->
        

        <!-- LOGOTIPO FLOTANTE INTERACTIVO (Gira 360 grados de forma continua)
             Ubicado a una distancia de 1.8 metros (z = -1.8) y visible por ambos lados (side: double) -->
        <a-plane id="avatar-campana" 
                 src="#logo-seccion" 
                 width="0.8" 
                 height="0.8" 
                 position="0 1.3 -1.8" 
                 material="transparent: true; opacity: 1; side: double; shader: flat"
                 animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
                 class="clickable">
        </a-plane>

        <!-- Lector de cámara del dispositivo móvil -->
        <a-camera raycaster="objects: .clickable">
            <a-cursor color="#0056b3" scale="0.4 0.4 0.4" opacity="0.6"></a-cursor>
        </a-camera>

    </a-scene>

    <script>
        // Control de eventos interactivos sobre el logotipo
        document.getElementById('avatar-campana').addEventListener('click', function () {
            document.getElementById('popup-propuesta').style.display = 'block';
        });

        function cerrarPropuesta() {
            document.getElementById('popup-propuesta').style.display = 'none';
        }
    </script>
</body>
</html>
